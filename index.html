<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黑龍 控制台</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f0f1a;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.gate {
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  border-radius: 16px;
  padding: 48px 40px;
  text-align: center;
  max-width: 400px;
  width: 90%;
}
.gate h2 { color: #7eb8f7; margin-bottom: 8px; font-size: 24px; }
.gate p { color: #666; font-size: 14px; margin-bottom: 32px; }
.gate input {
  width: 100%;
  padding: 12px 16px;
  background: #0d0d1a;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  color: #e0e0e0;
  font-size: 16px;
  text-align: center;
  margin-bottom: 16px;
}
.gate input:focus { outline: none; border-color: #7eb8f7; }
.gate .btn {
  width: 100%;
  padding: 12px;
  background: #7eb8f7;
  color: #0f0f1a;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.gate .btn:hover { background: #a8d1ff; }
.gate .error { color: #f87171; font-size: 13px; margin-top: 12px; display: none; }
#app { display: none; }
</style>
</head>
<body>

<div class="gate" id="gate">
  <h2>🐉 黑龍</h2>
  <p>輸入密碼進入控制台</p>
  <input type="password" id="pw" placeholder="密碼" onkeydown="if(event.key==='\'Enter\'')tryUnlock()">
  <button class="btn" onclick="tryUnlock()">進入</button>
  <div class="error" id="err">密碼錯誤，請再試一次</div>
</div>

<div id="app">
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黑龍 控制台</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f0f1a;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 20px;
}

h1 { color: #7eb8f7; margin-bottom: 4px; }
.subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }

.panel {
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  max-width: 700px;
}

.panel-title {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #888;
  margin-bottom: 16px;
  border-bottom: 1px solid #2a2a4a;
  padding-bottom: 8px;
}

.status-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #444;
  flex-shrink: 0;
}

.dot.green { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
.dot.yellow { background: #facc15; }
.dot.red { background: #f87171; }

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.2s;
}

.btn-primary {
  background: #7eb8f7;
  color: #0f0f1a;
}

.btn-primary:hover { background: #a8d1ff; }

.btn-success {
  background: #4ade80;
  color: #0f0f1a;
}

.btn-danger {
  background: #f87171;
  color: white;
}

.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.log-box {
  background: #0d0d1a;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  padding: 12px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  color: #aaa;
  max-height: 300px;
  overflow-y: auto;
  white-space: pre-wrap;
}

.log-line { margin-bottom: 4px; }
.log-line.ok { color: #4ade80; }
.log-line.error { color: #f87171; }
.log-line.info { color: #7eb8f7; }

.input-area {
  width: 100%;
  background: #0d0d1a;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  color: #e0e0e0;
  padding: 10px;
  font-size: 14px;
  resize: vertical;
  min-height: 80px;
  font-family: inherit;
}

.input-area:focus {
  outline: none;
  border-color: #7eb8f7;
}

.flex { display: flex; gap: 10px; align-items: center; }
.mt { margin-top: 12px; }
.text-sm { font-size: 13px; color: #888; }
.text-xs { font-size: 11px; color: #666; }
</style>
</head>
<body>

<h1>🐉 黑龍 控制台</h1>
<p class="subtitle">AI Agent 新手友善介面 — 讓每個人都能看懂我在做什麼</p>

<!-- 狀態面板 -->
<div class="panel">
  <div class="panel-title">系統狀態</div>
  <div class="status-row">
    <div class="dot green" id="dot-hermes"></div>
    <span>黑龍 Agent</span>
    <span class="text-sm" id="status-hermes">運行中</span>
  </div>
  <div class="status-row">
    <div class="dot green" id="dot-gateway"></div>
    <span>Gateway 介面</span>
    <span class="text-sm" id="status-gateway">已連線</span>
  </div>
  <div class="status-row">
    <div class="dot" id="dot-task"></div>
    <span>當前任務</span>
    <span class="text-sm" id="status-task">無</span>
  </div>
</div>

<!-- 任務面板 -->
<div class="panel">
  <div class="panel-title">🚀 對話任務</div>
  <p class="text-sm" style="margin-bottom:12px">告訴黑龍你想做什麼，例如：</p>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
    <button class="btn btn-primary" onclick="quickTask('帮我找一个文件')">📁 找文件</button>
    <button class="btn btn-primary" onclick="quickTask('帮我写一封邮件')">✉️ 写邮件</button>
    <button class="btn btn-primary" onclick="quickTask('帮我查一下天气')">🌤️ 查天气</button>
    <button class="btn btn-primary" onclick="quickTask('帮我总结这篇文章')">📝 总结文章</button>
  </div>
  <textarea class="input-area" id="task-input" placeholder="或者直接说你想做什么... (比如：帮我查今天新闻)"></textarea>
  <div class="flex mt">
    <button class="btn btn-success" id="btn-send" onclick="sendTask()">▶ 发送任务</button>
    <button class="btn btn-danger" onclick="stopTask()">■ 停止</button>
    <span class="text-sm" id="task-status" style="margin-left:12px"></span>
  </div>
</div>

<!-- 歷史日誌 -->
<div class="panel">
  <div class="panel-title">📋 活動日誌</div>
  <button class="btn btn-primary" onclick="refreshLog()" style="margin-bottom:12px">🔄 刷新</button>
  <div class="log-box" id="log-box">
    <div class="log-line info">系統就緒，開始使用吧。</div>
  </div>
</div>

<!-- 能力說明 -->
<div class="panel">
  <div class="panel-title">💡 我能做的事</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px;">
    <div>✅ 搜尋資料 & 回答問題</div>
    <div>✅ 讀寫文件和代碼</div>
    <div>✅ 控制瀏覽器自動操作</div>
    <div>✅ 定時任務 & 提醒</div>
    <div>✅ 發送郵件 & 訊息</div>
    <div>✅ 執行命令 & 腳本</div>
  </div>
  <p class="text-xs" style="margin-top:14px">⚠️ 所有操作都在你的電腦上執行，不會上傳隱私資料。</p>
</div>

<script>
// ---- 狀態更新 ----
async function refreshStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    document.getElementById('status-hermes').textContent = d.hermes ? '運行中' : '已停止';
    document.getElementById('dot-hermes').className = 'dot ' + (d.hermes ? 'green' : 'red');
    document.getElementById('status-gateway').textContent = d.gateway ? '已連線' : '已斷線';
    document.getElementById('dot-gateway').className = 'dot ' + (d.gateway ? 'green' : 'red');
    document.getElementById('status-task').textContent = d.current_task || '無';
    document.getElementById('dot-task').className = 'dot ' + (d.current_task ? 'yellow' : '');
  } catch(e) {}
}

// ---- 發送任務 ----
let taskId = 0;
async function sendTask() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text) return;

  const btn = document.getElementById('btn-send');
  btn.disabled = true;
  document.getElementById('task-status').textContent = '處理中...';
  document.getElementById('status-task').textContent = text.slice(0,30) + '...';
  document.getElementById('dot-task').className = 'dot yellow';

  log('info', '📤 任務已發送：' + text);

  try {
    const r = await fetch('/api/task', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({task: text, id: ++taskId})
    });
    const d = await r.json();
    if (d.ok) {
      log('ok', '✅ 任務完成：' + (d.result || '').slice(0, 100));
    } else {
      log('error', '❌ 失敗：' + d.error);
    }
  } catch(e) {
    log('error', '❌ 網絡錯誤：' + e.message);
  }

  btn.disabled = false;
  document.getElementById('task-status').textContent = '';
  document.getElementById('status-task').textContent = '無';
  document.getElementById('dot-task').className = 'dot';
  input.value = '';
}

// ---- 停止 ----
async function stopTask() {
  try {
    await fetch('/api/stop', {method:'POST'});
    log('info', '⏹ 任務已停止');
  } catch(e) { log('error', '停止失敗'); }
  document.getElementById('btn-send').disabled = false;
  document.getElementById('task-status').textContent = '';
}

// ---- 快速任務 ----
function quickTask(text) {
  document.getElementById('task-input').value = text;
  sendTask();
}

// ---- 日誌 ----
function log(type, msg) {
  const box = document.getElementById('log-box');
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

async function refreshLog() {
  log('info', '刷新日誌...');
  refreshStatus();
}

// ---- 初始化 ----
refreshStatus();
setInterval(refreshStatus, 5000);
</script>
</body>
</html>

</div>

<script>
function tryUnlock() {
  if (document.getElementById('pw').value === 'MrZ.Home') {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pw').value = '';
  }
}
</script>
</body>
</html>
