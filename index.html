<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐉 凡龍 — 修仙控制台</title>
<style>
/* ═══════════════════════════════════════════
   凡龍修仙控制台 · 簡約至上
   ═══════════════════════════════════════════ */

:root {
  --bg:      #08080f;
  --surface: #0d0d1c;
  --border:  #1e1e38;
  --jade:    #4ade80;
  --gold:    #facc15;
  --blood:   #f87171;
  --mist:    #a78bfa;
  --text:    #d4d4d8;
  --dim:     #52525b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Courier New', 'Noto Serif SC', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* 龍鱗紋理背景 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(74,222,128,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(250,204,21,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* 符印邊框 */
.panel {
  position: relative;
  z-index: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 28px 32px;
  width: 100%;
  max-width: 560px;
}

/* 頂部陰陽龍紋 */
.header {
  text-align: center;
  margin-bottom: 28px;
}

.dragon-emblem {
  font-size: 48px;
  line-height: 1;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 12px rgba(74,222,128,0.4));
  animation: breathe 4s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% { filter: drop-shadow(0 0 12px rgba(74,222,128,0.3)); }
  50%       { filter: drop-shadow(0 0 20px rgba(74,222,128,0.6)); }
}

.title {
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 6px;
  color: var(--jade);
  text-shadow: 0 0 20px rgba(74,222,128,0.3);
}

.subtitle {
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 3px;
  margin-top: 4px;
}

/* 三龍狀態 · 橫排 */
.dragon-row {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 24px;
}

.dragon-card {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px 6px;
  text-align: center;
}

.dragon-card .icon { font-size: 20px; margin-bottom: 4px; }
.dragon-card .name { font-size: 11px; color: var(--dim); letter-spacing: 1px; }
.dragon-card .state {
  font-size: 10px;
  margin-top: 4px;
  padding: 2px 6px;
  border-radius: 2px;
  display: inline-block;
}
.online  { color: var(--jade);  border: 1px solid var(--jade);  }
.sleep   { color: var(--gold);   border: 1px solid var(--gold);   }
.offline { color: var(--blood);  border: 1px solid var(--blood);  }

/* 修煉狀態條 */
.stats {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
}

.stat {
  flex: 1;
}

.stat-label {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.stat-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.stat-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 1s ease;
}

.hp-fill { background: linear-gradient(90deg, #22c55e, var(--jade)); }
.ap-fill { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
.qi-fill { background: linear-gradient(90deg, #7c3aed, var(--mist)); }

.stat-value {
  font-size: 11px;
  color: var(--dim);
  margin-top: 3px;
  text-align: right;
}

/* 刻度線裝飾 */
.ruler {
  border: none;
  border-top: 1px solid var(--border);
  margin: 0 0 20px;
  position: relative;
}

.ruler::before {
  content: '◇';
  position: absolute;
  left: 50%;
  top: -8px;
  transform: translateX(-50%);
  background: var(--surface);
  padding: 0 8px;
  color: var(--dim);
  font-size: 10px;
}

/* 命令輸入 */
.console-label {
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 3px;
  margin-bottom: 10px;
}

.console-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 12px 14px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.3s;
}

.console-input:focus { border-color: var(--jade); }

.console-input::placeholder { color: var(--dim); }

/* 輸出區 */
.console-output {
  margin-top: 10px;
  min-height: 80px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--dim);
  white-space: pre-wrap;
  line-height: 1.7;
}

.console-output.reply { color: var(--text); }

/* 底部日誌 */
.logs {
  margin-top: 20px;
  border-top: 1px solid var(--border);
  padding-top: 14px;
}

.log-label {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.log-entry {
  font-size: 11px;
  color: var(--dim);
  margin-bottom: 3px;
  display: flex;
  gap: 8px;
}

.log-time { color: #333; flex-shrink: 0; }

/* 底部版權 */
.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 10px;
  color: #2a2a3a;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div class="panel">

  <!-- 龍徽 + 標題 -->
  <div class="header">
    <div class="dragon-emblem">🐉</div>
    <div class="title">凡 龍</div>
    <div class="subtitle">HERMES · 協調中樞</div>
  </div>

  <!-- 三龍狀態 -->
  <div class="dragon-row">
    <div class="dragon-card">
      <div class="icon">🐉</div>
      <div class="name">黑龍</div>
      <span class="state online">在線</span>
    </div>
    <div class="dragon-card">
      <div class="icon">🐲</div>
      <div class="name">青龍</div>
      <span class="state sleep">休眠</span>
    </div>
    <div class="dragon-card">
      <div class="icon">🐡</div>
      <div class="name">金龍</div>
      <span class="state offline">斷線</span>
    </div>
  </div>

  <!-- 修煉狀態 -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">靈氣 QI</div>
      <div class="stat-bar"><div class="stat-fill qi-fill" style="width: 72%"></div></div>
      <div class="stat-value">72%</div>
    </div>
    <div class="stat">
      <div class="stat-label">心力 HP</div>
      <div class="stat-bar"><div class="stat-fill hp-fill" style="width: 85%"></div></div>
      <div class="stat-value">85%</div>
    </div>
    <div class="stat">
      <div class="stat-label">神識 AP</div>
      <div class="stat-bar"><div class="stat-fill ap-fill" style="width: 60%"></div></div>
      <div class="stat-value">60%</div>
    </div>
  </div>

  <hr class="ruler">

  <!-- 命令列 -->
  <div class="console-label">◆ 輸入指令</div>
  <input
    class="console-input"
    id="cmdInput"
    placeholder="例如：搜索 AI Agent 最新消息"
    onkeydown="if(event.key==='Enter')sendCmd()"
  >
  <div class="console-output" id="output">🐉 靜待指令...</div>

  <!-- 日誌 -->
  <div class="logs">
    <div class="log-label">◆ 活動日誌</div>
    <div id="logArea">
      <div class="log-entry"><span class="log-time">此刻</span>系統已啟動，凡龍修仙中</div>
    </div>
  </div>

</div>

<div class="footer">凡龍母體 v2.7 · 凡龍計劃</div>

<script>
/* ── 指令系統 ── */
const skills = {
  '搜索': { icon: '🌐', msg: '🌐 搜索模組啟動...' },
  '命令': { icon: '💻', msg: '💻 執行命令模組啟動...' },
  '文件': { icon: '📁', msg: '📁 文件操作模組啟動...' },
  '代碼': { icon: '🤖', msg: '🤖 寫代碼模組啟動...' },
  '瀏覽器': { icon: '🌍', msg: '🌍 瀏覽器控制啟動...' },
  '委派': { icon: '👥', msg: '👥 委派任務模組啟動...' },
  '協調': { icon: '🔗', msg: '🔗 協調鏈路：黑→青 ⚠️ / 青→金 ❌ / 金→黑 ❌' },
  '幫我': { icon: '✨', msg: '✨ 收到請求，翻譯為意圖...' },
};

function sendCmd() {
  const input = document.getElementById('cmdInput');
  const output = document.getElementById('output');
  const cmd = input.value.trim();
  if (!cmd) return;

  output.textContent = '⏳ 處理中...';
  output.className = 'console-output';
  addLog('→ ' + cmd);
  input.value = '';

  // 根據關鍵詞回應
  let reply = '✨ 已收到：「' + cmd + '」\n\n本頁面為展示介面。\n真實指令請在 Telegram 凡龍計劃中下達。';
  let found = false;

  for (const [kw, v] of Object.entries(skills)) {
    if (cmd.includes(kw)) {
      reply = v.msg + '\n\n✨ 已收到：「' + cmd + '」';
      found = true;
      break;
    }
  }

  setTimeout(() => {
    output.textContent = reply;
    output.className = 'console-output reply';
    addLog('🐉 回應完畢');
  }, 600);
}

function addLog(text) {
  const now = new Date();
  const time = now.toTimeString().slice(0,5);
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = '<span class="log-time">' + time + '</span>' + text;
  document.getElementById('logArea').prepend(div);
}

addLog('遊戲介面已載入');
</script>

</body>
</html>
