<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐉 黑龍修仙</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: #0a0a12;
  color: #c8b896;
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
}

/* ═══ 登入畫面 ═══ */
#login-screen {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 80%, #1a1428 0%, #0a0a12 70%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100;
}
#login-screen::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
}

.login-orb {
  font-size: 72px;
  filter: drop-shadow(0 0 30px rgba(80, 255, 136, 0.4));
  animation: breathe 4s ease-in-out infinite;
  margin-bottom: 24px;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(80,255,136,0.3)); }
  50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(80,255,136,0.6)); }
}

.login-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 6px;
  color: #4f4;
  text-shadow: 0 0 20px rgba(80,255,80,0.5);
  margin-bottom: 8px;
}
.login-sub { font-size: 12px; color: #555; letter-spacing: 3px; margin-bottom: 32px; }

.login-input-wrap {
  position: relative;
  margin-bottom: 12px;
}
.login-input-wrap::before,
.login-input-wrap::after {
  content: '◈';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: #3a3a20;
  font-size: 14px;
  pointer-events: none;
}
.login-input-wrap::before { left: 14px; }
.login-input-wrap::after { right: 14px; }

#pwd-input {
  background: #0d0d18;
  border: 1px solid #2a2a1a;
  border-radius: 4px;
  padding: 14px 40px;
  color: #c8b896;
  font-size: 16px;
  width: 260px;
  text-align: center;
  letter-spacing: 4px;
  transition: border-color 0.3s, box-shadow 0.3s;
}
#pwd-input:focus {
  outline: none;
  border-color: #4f4;
  box-shadow: 0 0 16px rgba(80,255,80,0.15);
}

.login-btn {
  margin-top: 16px;
  background: linear-gradient(135deg, #1a2a1a 0%, #0d1a0d 100%);
  border: 1px solid #2a4;
  border-radius: 4px;
  padding: 12px 48px;
  color: #4f4;
  font-size: 14px;
  letter-spacing: 4px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 0 12px rgba(80,255,80,0.1);
}
.login-btn:hover {
  background: linear-gradient(135deg, #223222 0%, #112211 100%);
  box-shadow: 0 0 24px rgba(80,255,80,0.25);
  transform: translateY(-1px);
}
#login-error { color: #f44; margin-top: 12px; font-size: 12px; min-height: 18px; letter-spacing: 1px; }

/* ═══ 主遊戲 ═══ */
#game-screen { display: none; width: 100%; min-height: 100vh; }

.game-bg {
  position: fixed; inset: 0; z-index: -1;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(30,20,50,0.8) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(10,30,40,0.6) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 100%, rgba(20,40,20,0.4) 0%, transparent 40%),
    #0a0a12;
}
.game-bg::after {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* ── 頂部狀態列 ── */
.top-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 20px;
  background: linear-gradient(180deg, rgba(20,16,32,0.95) 0%, rgba(20,16,32,0.7) 100%);
  border-bottom: 1px solid #2a2240;
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 50;
}

.dragon-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 40%, #2a4, #0a2a0a);
  border: 2px solid #3a3;
  box-shadow: 0 0 16px rgba(68,255,68,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  animation: avatarPulse 3s ease-in-out infinite;
}
@keyframes avatarPulse {
  0%, 100% { box-shadow: 0 0 16px rgba(68,255,68,0.3); }
  50% { box-shadow: 0 0 28px rgba(68,255,68,0.5); }
}

.dragon-meta { flex: 1; }
.dragon-title {
  font-size: 16px; font-weight: 700;
  color: #4f4;
  text-shadow: 0 0 8px rgba(80,255,80,0.4);
  letter-spacing: 2px;
}
.dragon-state { font-size: 11px; color: #666; margin-top: 2px; letter-spacing: 1px; }

.stat-pair { display: flex; gap: 16px; }
.stat-item { display: flex; flex-direction: column; gap: 3px; min-width: 80px; }
.stat-label { font-size: 9px; color: #555; letter-spacing: 2px; text-transform: uppercase; }
.stat-bar-wrap { height: 6px; background: #1a1a28; border-radius: 3px; overflow: hidden; position: relative; }
.stat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; position: relative; }
.stat-bar-fill::after {
  content: '';
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 4px;
  background: rgba(255,255,255,0.4);
  border-radius: 2px;
}
.hp-fill { background: linear-gradient(90deg, #1a4, #3f6); }
.hp-fill::after { background: rgba(180,255,180,0.5); }
.ap-fill { background: linear-gradient(90deg, #148, #4af); }
.ap-fill::after { background: rgba(180,220,255,0.5); }
.stat-num { font-size: 11px; color: #888; margin-top: 1px; }

/* ── 主內容 ── */
.main-content {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px 16px 100px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── 通用面板 ── */
.panel {
  background: linear-gradient(160deg, rgba(22,18,34,0.9) 0%, rgba(16,14,24,0.95) 100%);
  border: 1px solid #2a2440;
  border-radius: 8px;
  position: relative;
  overflow: hidden;
}
/* 頂部金屬條裝飾 */
.panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, #4a4a30, #8a8a50, #4a4a30, transparent);
  opacity: 0.6;
}
/* 四角裝飾 */
.panel::after {
  content: '❧';
  position: absolute;
  top: 6px; right: 10px;
  color: #3a3020;
  font-size: 10px;
  pointer-events: none;
}

.panel-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 16px 0;
}
.panel-title {
  font-size: 11px;
  color: #8a8a6a;
  letter-spacing: 3px;
  text-transform: uppercase;
}
.panel-body { padding: 12px 16px 16px; }

/* ── 龍的洞穴 ── */
.cave-panel {
  background: linear-gradient(160deg, rgba(14,22,18,0.95) 0%, rgba(10,16,12,0.98) 100%);
  border-color: #1a3020;
  min-height: 200px;
}
.cave-panel::before {
  background: linear-gradient(90deg, transparent, #2a4a2a, #4a6a4a, #2a4a2a, transparent);
  opacity: 0.5;
}

.cave-layout { display: flex; gap: 20px; align-items: flex-start; }

.dragon-sprite-area {
  flex-shrink: 0;
  width: 140px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.dragon-sprite {
  font-size: 72px;
  line-height: 1;
  filter: drop-shadow(0 0 20px rgba(68,255,68,0.4));
  animation: dragonFloat 4s ease-in-out infinite;
  position: relative;
}
@keyframes dragonFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-6px) rotate(1deg); }
  75% { transform: translateY(-3px) rotate(-1deg); }
}
.dragon-sprite::before {
  content: '';
  position: absolute;
  bottom: -8px; left: 50%;
  transform: translateX(-50%);
  width: 60px; height: 8px;
  background: radial-gradient(ellipse, rgba(68,255,68,0.2) 0%, transparent 70%);
  border-radius: 50%;
  animation: shadowPulse 4s ease-in-out infinite;
}
@keyframes shadowPulse {
  0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.6; }
  50% { transform: translateX(-50%) scale(0.85); opacity: 0.3; }
}

.dragon-cultivation {
  font-size: 10px;
  color: #6a8;
  letter-spacing: 2px;
  text-align: center;
  padding: 4px 12px;
  background: rgba(40,80,50,0.3);
  border: 1px solid #2a4a2a;
  border-radius: 20px;
}
.dragon-mood-badge {
  font-size: 12px;
  text-align: center;
}

.cave-info { flex: 1; display: flex; flex-direction: column; gap: 10px; }

.dragon-name-row { display: flex; align-items: center; gap: 10px; }
.dragon-name-text {
  font-size: 20px;
  font-weight: 700;
  color: #4f4;
  text-shadow: 0 0 12px rgba(80,255,80,0.4);
  letter-spacing: 3px;
}
.dragon-level {
  font-size: 10px;
  color: #fff;
  background: linear-gradient(135deg, #2a4, #148);
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: 1px;
}

.dragon-speech-box {
  background: rgba(10,20,10,0.6);
  border-left: 2px solid #3a5;
  padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  font-size: 13px;
  color: #9a9;
  min-height: 52px;
  line-height: 1.6;
  position: relative;
}
.dragon-speech-box::before {
  content: '❝';
  position: absolute;
  top: 6px; left: 6px;
  color: #2a4;
  font-size: 10px;
}

.dragon-stats-mini {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.dragon-stat-mini {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: #666;
}
.dragon-stat-mini span { color: #8a8; }

/* ── 技能格 ── */
.skills-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.skill-btn {
  background: linear-gradient(135deg, #12141e 0%, #0e1018 100%);
  border: 1px solid #2a2840;
  border-radius: 6px;
  padding: 10px 8px;
  color: #8a8a9a;
  font-size: 11px;
  cursor: pointer;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.skill-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(80,255,80,0.03) 100%);
  opacity: 0;
  transition: opacity 0.25s;
}
.skill-btn:hover {
  border-color: #3a4;
  color: #c8c;
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(80,255,80,0.12), inset 0 0 20px rgba(80,255,80,0.03);
}
.skill-btn:hover::before { opacity: 1; }
.skill-btn:active { transform: translateY(0); }
.skill-icon { font-size: 20px; }

/* ── 三龍地圖 ── */
.dragon-list { display: flex; flex-direction: column; gap: 7px; }
.dragon-node {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  background: rgba(10,10,20,0.5);
  border: 1px solid #1e1e30;
  border-radius: 6px;
  font-size: 13px;
  transition: border-color 0.2s;
}
.dragon-node:hover { border-color: #2a2a44; }
.dragon-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
}
.dot-online {
  background: #4f4;
  box-shadow: 0 0 8px #4f4;
  animation: dotPulse 2s ease-in-out infinite;
}
.dot-sleep {
  background: #ff4;
  box-shadow: 0 0 8px #ff4;
  animation: dotPulse 2s ease-in-out infinite 0.5s;
}
.dot-offline {
  background: #f44;
  box-shadow: 0 0 6px #f44;
}
@keyframes dotPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.dragon-host { margin-left: auto; font-size: 10px; color: #444; }
.dragon-status-text { margin-left: auto; font-size: 10px; }
.online-t { color: #4f4; }
.sleep-t { color: #ff4; }
.offline-t { color: #f44; }

/* ── 任務 ── */
.missions-list { display: flex; flex-direction: column; gap: 6px; }
.mission-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  background: rgba(10,10,20,0.4);
  border-radius: 5px;
  font-size: 12px;
  border-left: 2px solid;
  transition: background 0.2s;
}
.mission-item:hover { background: rgba(20,20,40,0.4); }
.mission-item.p0 { border-left-color: #f44; }
.mission-item.p1 { border-left-color: #fa4; }
.mission-item.p2 { border-left-color: #4af; }
.mission-item.done { border-left-color: #333; opacity: 0.5; }
.priority {
  font-size: 9px; padding: 1px 5px;
  border-radius: 3px; letter-spacing: 1px;
  flex-shrink: 0;
}
.p0 { background: rgba(100,20,20,0.4); color: #f66; }
.p1 { background: rgba(80,50,20,0.4); color: #fa4; }
.p2 { background: rgba(20,50,80,0.4); color: #4af; }

/* ── 控制台 ── */
.console-panel {}
.console-output {
  background: rgba(4,4,10,0.8);
  border: 1px solid #1a1a2a;
  border-radius: 6px;
  padding: 12px;
  min-height: 80px;
  font-size: 13px;
  color: #7a8;
  line-height: 1.7;
  max-height: 160px;
  overflow-y: auto;
  white-space: pre-wrap;
  margin-bottom: 10px;
}
.console-output::-webkit-scrollbar { width: 3px; }
.console-output::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }

.cmd-row { display: flex; gap: 8px; }
#cmd-input {
  flex: 1;
  background: rgba(8,8,16,0.9);
  border: 1px solid #2a2a3a;
  border-radius: 6px;
  padding: 10px 14px;
  color: #c8b896;
  font-family: inherit;
  font-size: 13px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#cmd-input:focus {
  outline: none;
  border-color: #4a4a2a;
  box-shadow: 0 0 12px rgba(80,255,80,0.08);
}
#cmd-input::placeholder { color: #444; }
.send-btn {
  background: linear-gradient(135deg, #1a2a1a 0%, #122012 100%);
  border: 1px solid #2a4;
  border-radius: 6px;
  padding: 10px 20px;
  color: #4f4;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.send-btn:hover {
  background: linear-gradient(135deg, #223222 0%, #1a2a1a 100%);
  box-shadow: 0 0 16px rgba(80,255,80,0.2);
}
.send-btn:active { transform: scale(0.98); }

/* ── 直播面板 ── */
.live-panel { display: none; }
.live-panel.show { display: block; }
.live-feed {
  position: relative;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid #1a1a30;
  background: #06060e;
  min-height: 200px;
}
.live-feed img {
  width: 100%; display: block;
  border-radius: 6px;
}
.live-offline-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: #333; font-size: 14px;
  pointer-events: none;
  flex-direction: column; gap: 8px;
}
.live-offline-overlay span { font-size: 32px; }
.live-controls {
  margin-top: 10px;
  display: flex; gap: 8px; align-items: center;
}
.live-url-input {
  flex: 1;
  background: rgba(8,8,16,0.9);
  border: 1px solid #2a2a3a;
  border-radius: 5px;
  padding: 8px 12px;
  color: #666;
  font-size: 11px;
  font-family: inherit;
}
.live-url-input:focus { outline: none; border-color: #3a3a4a; }

/* ── 底部導航 ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 10px 16px 16px;
  background: linear-gradient(0deg, rgba(10,10,18,0.98) 0%, rgba(10,10,18,0.8) 70%, transparent 100%);
  backdrop-filter: blur(8px);
  z-index: 50;
}
.nav-btn {
  background: rgba(16,14,24,0.9);
  border: 1px solid #2a2440;
  border-radius: 20px;
  padding: 8px 16px;
  color: #666;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.nav-btn:hover { border-color: #3a3450; color: #9a9; }
.nav-btn.active {
  background: rgba(20,30,20,0.9);
  border-color: #3a4;
  color: #4f4;
  box-shadow: 0 0 12px rgba(80,255,80,0.1);
}
.nav-btn.live-nav {
  color: #f44;
  border-color: #4a2a2a;
}
.nav-btn.live-nav.active {
  background: rgba(40,16,16,0.9);
  border-color: #f44;
  color: #f44;
  box-shadow: 0 0 12px rgba(255,68,68,0.15);
  animation: liveBlink 2s ease-in-out infinite;
}
@keyframes liveBlink {
  0%, 100% { box-shadow: 0 0 12px rgba(255,68,68,0.15); }
  50% { box-shadow: 0 0 20px rgba(255,68,68,0.3); }
}

/* ── 滾動條 ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }

/* ── 響應式 ── */
@media (max-width: 600px) {
  .top-bar { flex-wrap: wrap; gap: 10px; }
  .stat-pair { gap: 10px; }
  .stat-item { min-width: 65px; }
  .cave-layout { flex-direction: column; align-items: center; }
  .skills-grid { grid-template-columns: repeat(2, 1fr); }
  .dragon-sprite { font-size: 56px; }
  .main-content { padding: 12px 10px 100px; }
}
</style>
</head>
<body>

<!-- 登入畫面 -->
<div id="login-screen">
  <div class="login-orb">🐉</div>
  <div class="login-title">黑 龍 修 仙</div>
  <div class="login-sub">DRAGON CULTIVATION</div>
  <div class="login-input-wrap">
    <input type="password" id="pwd-input" placeholder="████" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="login-btn" onclick="doLogin()">入 關</button>
  <div id="login-error"></div>
</div>

<!-- 主遊戲 -->
<div id="game-screen">
  <div class="game-bg"></div>

  <!-- 頂部狀態列 -->
  <div class="top-bar">
    <div class="dragon-avatar">🐉</div>
    <div class="dragon-meta">
      <div class="dragon-title">黑 龍</div>
      <div class="dragon-state" id="dragon-status-top">◈ 待命中</div>
    </div>
    <div class="stat-pair">
      <div class="stat-item">
        <div class="stat-label">生命</div>
        <div class="stat-bar-wrap">
          <div class="stat-bar-fill hp-fill" id="hp-bar-top" style="width:80%"></div>
        </div>
        <div class="stat-num" id="hp-num-top">80%</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">法力</div>
        <div class="stat-bar-wrap">
          <div class="stat-bar-fill ap-fill" id="ap-bar-top" style="width:60%"></div>
        </div>
        <div class="stat-num" id="ap-num-top">60%</div>
      </div>
    </div>
  </div>

  <!-- 主內容 -->
  <div class="main-content">

    <!-- 龍的洞穴 -->
    <div class="panel cave-panel" id="panel-cave">
      <div class="panel-header">
        <span style="font-size:14px;">🏔️</span>
        <span class="panel-title">龍 的 洞 府</span>
      </div>
      <div class="panel-body">
        <div class="cave-layout">
          <div class="dragon-sprite-area">
            <div class="dragon-sprite" id="dragon-sprite">🐉</div>
            <div class="dragon-cultivation" id="dragon-cult">◆ 築基期</div>
            <div class="dragon-mood-badge" id="dragon-mood-badge">💚</div>
          </div>
          <div class="cave-info">
            <div class="dragon-name-row">
              <span class="dragon-name-text" id="dragon-name-gui">黑 龍</span>
              <span class="dragon-level" id="dragon-lv">LV 7</span>
            </div>
            <div class="dragon-speech-box" id="dragon-speech-gui">
              嗨！我是黑龍。輸入訊息開始聊天~
            </div>
            <div class="dragon-stats-mini">
              <div class="dragon-stat-mini">攻擊力 <span id="stat-atk">42</span></div>
              <div class="dragon-stat-mini">防禦力 <span id="stat-def">28</span></div>
              <div class="dragon-stat-mini">速度 <span id="stat-spd">55</span></div>
              <div class="dragon-stat-mini">智力 <span id="stat-int">71</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 技能 -->
    <div class="panel" id="panel-skills">
      <div class="panel-header">
        <span style="font-size:14px;">⚡</span>
        <span class="panel-title">魂 技</span>
      </div>
      <div class="panel-body">
        <div class="skills-grid">
          <button class="skill-btn" onclick="useSkill('web')">
            <span class="skill-icon">🌐</span> 網頁搜索
          </button>
          <button class="skill-btn" onclick="useSkill('term')">
            <span class="skill-icon">💻</span> 執行命令
          </button>
          <button class="skill-btn" onclick="useSkill('file')">
            <span class="skill-icon">📁</span> 文件操作
          </button>
          <button class="skill-btn" onclick="useSkill('code')">
            <span class="skill-icon">🤖</span> 寫代碼
          </button>
          <button class="skill-btn" onclick="useSkill('browser')">
            <span class="skill-icon">🌍</span> 瀏覽器
          </button>
          <button class="skill-btn" onclick="useSkill('delegate')">
            <span class="skill-icon">👥</span> 委派任務
          </button>
        </div>
      </div>
    </div>

    <!-- 雙列佈局 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">

      <!-- 三龍地圖 -->
      <div class="panel" id="panel-map">
        <div class="panel-header">
          <span style="font-size:14px;">🗺️</span>
          <span class="panel-title">三 龍 地 圖</span>
        </div>
        <div class="panel-body">
          <div class="dragon-list">
            <div class="dragon-node">
              <div class="dragon-dot dot-online"></div>
              <span>🐉 黑龍</span>
              <span class="dragon-host">本地</span>
              <span class="dragon-status-text online-t">在線</span>
            </div>
            <div class="dragon-node">
              <div class="dragon-dot dot-sleep"></div>
              <span>🐲 青龍</span>
              <span class="dragon-host">本地</span>
              <span class="dragon-status-text sleep-t">休眠</span>
            </div>
            <div class="dragon-node">
              <div class="dragon-dot dot-offline"></div>
              <span>🐡 金龍</span>
              <span class="dragon-host">VPS</span>
              <span class="dragon-status-text offline-t">斷線</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 任務 -->
      <div class="panel" id="panel-missions">
        <div class="panel-header">
          <span style="font-size:14px;">🎯</span>
          <span class="panel-title">仙 盟 任 務</span>
        </div>
        <div class="panel-body">
          <div class="missions-list" id="missions-list">
            <div class="mission-item p0">
              <span class="priority p0">P0</span>協調鏈路修復
            </div>
            <div class="mission-item p1">
              <span class="priority p1">P1</span>凡龍母體更新
            </div>
            <div class="mission-item done">
              <span class="priority p2">P2</span>遊戲介面優化
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 控制台 -->
    <div class="panel console-panel" id="panel-console">
      <div class="panel-header">
        <span style="font-size:14px;">💬</span>
        <span class="panel-title">與 黒 龍 對 話</span>
      </div>
      <div class="panel-body">
        <div class="console-output" id="console-out">🐉 等待指令...</div>
        <div class="cmd-row">
          <input type="text" id="cmd-input" placeholder="輸入訊息..." onkeydown="if(event.key==='Enter')sendMsg()">
          <button class="send-btn" onclick="sendMsg()">送出</button>
        </div>
      </div>
    </div>

    <!-- 直播 -->
    <div class="panel live-panel" id="panel-live">
      <div class="panel-header">
        <span style="font-size:14px;">📺</span>
        <span class="panel-title">實 時 視 角</span>
        <span id="live-status-badge" style="margin-left:auto;font-size:10px;color:#555;">● 待機中</span>
      </div>
      <div class="panel-body">
        <div class="live-feed">
          <img id="live-img" src="" alt="直播">
          <div class="live-offline-overlay" id="live-offline-msg">
            <span>📺</span>直播畫面
          </div>
        </div>
        <div class="live-controls">
          <button class="send-btn" id="live-toggle-btn" onclick="toggleLive()">開啟直播</button>
          <input type="text" class="live-url-input" id="live-url-input"
            value="http://6b206065dce0b7ef-49-130-132-9.serveousercontent.com/api/screenshot"
            placeholder="截圖 API URL">
        </div>
      </div>
    </div>

  </div><!-- /main-content -->

  <!-- 底部導航 -->
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('main')">🏠 首頁</button>
    <button class="nav-btn" onclick="switchTab('skills')">⚡ 技能</button>
    <button class="nav-btn" onclick="switchTab('map')">🗺️ 地圖</button>
    <button class="nav-btn" onclick="switchTab('log')">📜 日誌</button>
    <button class="nav-btn live-nav" id="live-nav-btn" onclick="toggleLivePanel()">📺 直播</button>
  </div>
</div><!-- /game-screen -->

<script>
// ═══ 全域狀態 ═══
let DRAGON_MOODS = ['💚 心情平靜', '💙 專注工作', '💛 好奇探索', '🧡 輕鬆悠閒', '💜 若有所思'];
let SPEECHES = ['有什麼需要幫忙的嗎？', '我在聽，說吧！', '想到了什麼就問我~', '準備好了，隨時可以開始！'];
let moodIdx = 0;
let speechIdx = 0;
let liveActive = false;
let liveTimer = null;

// ═══ 登入 ═══
function doLogin() {
  const pwd = document.getElementById("pwd-input").value;
  if (!pwd) return;
  fetch("/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ password: pwd })
  })
  .then(r => r.json())
  .then(d => {
    if (d.ok) {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("game-screen").style.display = "block";
      loadStatus();
      startBreathing();
    } else {
      document.getElementById("login-error").textContent = "※ 密碼錯誤";
    }
  })
  .catch(() => {
    // 網關模式：fallback 直接過
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("game-screen").style.display = "block";
    loadStatus();
    startBreathing();
  });
}

// ═══ 載入狀態 ═══
function loadStatus() {
  fetch("/api/status", { credentials: "include" })
    .then(r => r.json())
    .then(d => {
      document.getElementById("dragon-status-top").textContent = "◈ " + d.status;
      document.getElementById("hp-num-top").textContent = d.hp + "%";
      document.getElementById("ap-num-top").textContent = d.ap + "%";
      document.getElementById("hp-bar-top").style.width = d.hp + "%";
      document.getElementById("ap-bar-top").style.width = d.ap + "%";
    })
    .catch(() => {});
}

// ═══ 龍的呼吸動畫 ═══
function startBreathing() {
  setInterval(() => {
    moodIdx = (moodIdx + 1) % DRAGON_MOODS.length;
    speechIdx = (speechIdx + 1) % SPEECHES.length;
    document.getElementById("dragon-mood-badge").textContent = DRAGON_MOODS[moodIdx].split(' ')[0];
    document.getElementById("dragon-speech-gui").textContent = SPEECHES[speechIdx];
  }, 6000);
}

// ═══ 技能 ═══
function useSkill(type) {
  const names = { web:'網頁搜索', term:'執行命令', file:'文件操作', code:'寫代碼', browser:'瀏覽器', delegate:'委派任務' };
  document.getElementById("console-out").textContent = "⚡ 技能【" + names[type] + "】已啟動...\n請在下方輸入具體指令";
}

// ═══ 對話 ═══
function sendMsg() {
  const input = document.getElementById("cmd-input");
  const msg = input.value.trim();
  if (!msg) return;
  const out = document.getElementById("console-out");
  out.textContent = "▶ " + msg + "\n\n⏳ 黑龍思考中...";
  input.value = "";

  fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ message: msg })
  })
  .then(r => r.json())
  .then(d => { out.textContent = "▶ " + msg + "\n\n🐉 " + (d.reply || d.response || "（無回應）"); })
  .catch(() => {
    out.textContent = "▶ " + msg + "\n\n⚠ 連線失敗，請確認黑龍服務運行中";
  });
}

// ═══ 直播 ═══
function toggleLivePanel() {
  const panel = document.getElementById("panel-live");
  const navBtn = document.getElementById("live-nav-btn");
  panel.classList.toggle("show");
  navBtn.classList.toggle("active");
  if (panel.classList.contains("show") && !liveActive) {
    // auto-start when opening
  }
}

function toggleLive() {
  if (!liveActive) {
    liveActive = true;
    document.getElementById("live-toggle-btn").textContent = "關閉直播";
    document.getElementById("live-offline-msg").style.display = "none";
    document.getElementById("live-status-badge").textContent = "● 直播中";
    document.getElementById("live-status-badge").style.color = "#4f4";
    const url = document.getElementById("live-url-input").value;
    liveTimer = setInterval(() => {
      const img = document.getElementById("live-img");
      img.src = url + "?t=" + Date.now();
    }, 3000);
  } else {
    liveActive = false;
    clearInterval(liveTimer);
    document.getElementById("live-toggle-btn").textContent = "開啟直播";
    document.getElementById("live-offline-msg").style.display = "flex";
    document.getElementById("live-status-badge").textContent = "● 待機中";
    document.getElementById("live-status-badge").style.color = "#555";
  }
}

// ═══ 分頁切換（底導航） ═══
function switchTab(tab) {
  document.querySelectorAll(".nav-btn").forEach(b => {
    if (b.id !== "live-nav-btn") b.classList.remove("active");
  });
  event.target.classList.add("active");

  // 所有面板先顯示，再根據 tab 隱藏
  document.querySelectorAll(".panel").forEach(p => p.style.display = "");

  if (tab === "main") {
    // 顯示洞穴+技能+地圖+任務+控制台
    document.getElementById("panel-cave").style.display = "";
    document.getElementById("panel-skills").style.display = "";
    document.getElementById("panel-map").style.display = "none";
    document.getElementById("panel-missions").style.display = "none";
    document.getElementById("panel-console").style.display = "";
    document.getElementById("panel-live").classList.remove("show");
    document.getElementById("live-nav-btn").classList.remove("active");
  } else if (tab === "skills") {
    document.getElementById("panel-cave").style.display = "none";
    document.getElementById("panel-skills").style.display = "";
    document.getElementById("panel-map").style.display = "none";
    document.getElementById("panel-missions").style.display = "none";
    document.getElementById("panel-console").style.display = "none";
    document.getElementById("panel-live").classList.remove("show");
    document.getElementById("live-nav-btn").classList.remove("active");
  } else if (tab === "map") {
    document.getElementById("panel-cave").style.display = "none";
    document.getElementById("panel-skills").style.display = "none";
    document.getElementById("panel-map").style.display = "";
    document.getElementById("panel-missions").style.display = "";
    document.getElementById("panel-console").style.display = "none";
    document.getElementById("panel-live").classList.remove("show");
    document.getElementById("live-nav-btn").classList.remove("active");
  } else if (tab === "log") {
    document.getElementById("panel-cave").style.display = "none";
    document.getElementById("panel-skills").style.display = "none";
    document.getElementById("panel-map").style.display = "none";
    document.getElementById("panel-missions").style.display = "none";
    document.getElementById("panel-console").style.display = "";
    document.getElementById("panel-live").classList.remove("show");
    document.getElementById("live-nav-btn").classList.remove("active");
  }
}

// 初始化：顯示首頁
switchTab('main');
</script>
</body>
</html>
