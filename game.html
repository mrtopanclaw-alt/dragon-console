<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐉 黑龍控制台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Courier New', monospace;
  background: #080810;
  color: #c0c8d0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  overflow-x: hidden;
}

/* ═══ 登入畫面 ═══ */
#login-screen {
  position: fixed; inset: 0;
  background: #080810;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100;
}
#login-screen input {
  background: #111122;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 12px 20px;
  color: #e0e0e0;
  font-size: 16px;
  width: 220px;
  text-align: center;
  margin-top: 16px;
}
#login-screen input:focus { outline: none; border-color: #555; }
#login-screen button {
  margin-top: 12px;
  background: #1a1a3a;
  border: 1px solid #444;
  border-radius: 8px;
  padding: 10px 30px;
  color: #e0e0e0;
  font-size: 14px;
  cursor: pointer;
}
#login-screen button:hover { border-color: #666; background: #222; }
#login-error { color: #f66; margin-top: 10px; font-size: 13px; min-height: 20px; }

/* ═══ 主遊戲 ═══ */
#game-screen { display: none; width: 100%; max-width: 900px; }

/* ── 狀態列 ── */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(180deg, #0f0f20 0%, #0a0a18 100%);
  border: 1px solid #1e1e38;
  border-radius: 12px;
  padding: 14px 20px;
  margin-bottom: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.dragon-name {
  font-size: 18px;
  font-weight: bold;
  background: linear-gradient(135deg, #4f4, #4af);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.status-text { font-size: 12px; color: #888; }
.status-text span { color: #ff4; }

/* ── 血條AP條 ── */
.bars { display: flex; gap: 20px; }
.bar-wrap { display: flex; flex-direction: column; gap: 4px; width: 120px; }
.bar-label { font-size: 10px; color: #666; display: flex; justify-content: space-between; }
.bar-bg {
  height: 8px; background: #1a1a30;
  border-radius: 4px; overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.5s ease;
}
.hp-fill { background: linear-gradient(90deg, #2a4, #4f4); }
.ap-fill { background: linear-gradient(90deg, #248, #4af); }

/* ── 主內容區 ── */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

/* ── 面板通用 ── */
.panel {
  background: linear-gradient(145deg, #0e0e1c 0%, #0a0a14 100%);
  border: 1px solid #1c1c30;
  border-radius: 12px;
  padding: 16px;
  position: relative;
  overflow: hidden;
}
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, #333, transparent);
}
.panel-title {
  font-size: 12px;
  color: #555;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── 龍的洞穴 ── */
.dragon-cave {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 20px;
  min-height: 160px;
}
.dragon-art {
  font-size: 11px;
  line-height: 1.2;
  color: #4f4;
  white-space: pre;
  text-shadow: 0 0 10px rgba(68, 255, 68, 0.3);
  animation: float 3s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}
.dragon-info { flex: 1; }
.dragon-mood {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 8px;
}
.dragon-speech {
  background: #111128;
  border-left: 3px solid #4f4;
  padding: 10px 14px;
  border-radius: 0 8px 8px 0;
  font-size: 13px;
  color: #ccc;
  min-height: 50px;
}

/* ── 技能面板 ── */
.skills-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.skill-btn {
  background: #12122a;
  border: 1px solid #2a2a44;
  border-radius: 8px;
  padding: 10px 8px;
  color: #a0a8c0;
  font-size: 12px;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}
.skill-btn:hover {
  background: #1a1a3a;
  border-color: #4f4;
  color: #e0;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(68,255,68,0.15);
}
.skill-btn:active { transform: translateY(0); }
.skill-icon { font-size: 16px; }

/* ── 三龍地圖 ── */
.dragon-list { display: flex; flex-direction: column; gap: 8px; }
.dragon-node {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  background: #0d0d1a;
  border-radius: 8px;
  font-size: 13px;
}
.dragon-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-online { background: #4f4; box-shadow: 0 0 8px #4f4; }
.dot-sleep { background: #ff4; box-shadow: 0 0 8px #ff4; animation: pulse 2s infinite; }
.dot-offline { background: #f44; box-shadow: 0 0 8px #f44; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.dragon-host { margin-left: auto; font-size: 11px; color: #444; }

/* ── 任務面板 ── */
.missions-list { display: flex; flex-direction: column; gap: 6px; }
.mission-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  background: #0d0d1a;
  border-radius: 6px;
  font-size: 12px;
  border-left: 3px solid #4f4;
}
.mission-item.done { border-left-color: #444; opacity: 0.5; text-decoration: line-through; }
.priority { font-size: 10px; padding: 1px 5px; border-radius: 3px; }
.p0 { background: #3a1a1a; color: #f66; }
.p1 { background: #3a2a1a; color: #fa4; }
.p2 { background: #1a2a3a; color: #4af; }

/* ── 控制台 ── */
.console-panel {
  grid-column: 1 / -1;
}
.console-input-row { display: flex; gap: 8px; }
#cmd-input {
  flex: 1;
  background: #0a0a18;
  border: 1px solid #222;
  border-radius: 8px;
  padding: 10px 14px;
  color: #e0e0e0;
  font-family: inherit;
  font-size: 14px;
}
#cmd-input:focus { outline: none; border-color: #444; }
.send-btn {
  background: #1a2a1a;
  border: 1px solid #2a4;
  border-radius: 8px;
  padding: 10px 20px;
  color: #4f4;
  font-size: 14px;
  cursor: pointer;
}
.send-btn:hover { background: #222; }
.console-output {
  margin-top: 10px;
  background: #06060e;
  border: 1px solid #1a1a2a;
  border-radius: 8px;
  padding: 12px;
  min-height: 80px;
  font-size: 13px;
  color: #aaa;
  white-space: pre-wrap;
  max-height: 200px;
  overflow-y: auto;
}

/* ── 底部導航 ── */
.nav-bar {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 16px;
}
.nav-btn {
  background: #111122;
  border: 1px solid #2a2a44;
  border-radius: 20px;
  padding: 8px 16px;
  color: #666;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-btn:hover, .nav-btn.active {
  background: #1a1a3a;
  border-color: #4f4;
  color: #4f4;
}

/* ── 滾動條 ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

/* ═══ 響應式 ═══ */
@media (max-width: 600px) {
  .main-grid { grid-template-columns: 1fr; }
  .dragon-cave { flex-direction: column; text-align: center; }
  .bars { flex-direction: column; gap: 10px; }
}
</style>
</head>
<body>

<!-- 登入畫面 -->
<div id="login-screen">
  <div style="font-size:48px;margin-bottom:20px;">🐉</div>
  <div style="font-size:20px;color:#4f4;margin-bottom:8px;">黑龍控制台</div>
  <div style="font-size:12px;color:#555;">輸入密碼進入</div>
  <input type="password" id="pwd-input" placeholder="密碼" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">進入</button>
  <div id="login-error"></div>
</div>

<!-- 主遊戲 -->
<div id="game-screen">

  <!-- 狀態列 -->
  <div class="status-bar">
    <div>
      <div class="dragon-name">🐉 黑龍</div>
      <div class="status-text">狀態：<span id="dragon-status">待命中</span></div>
    </div>
    <div class="bars">
      <div class="bar-wrap">
        <div class="bar-label"><span>HP</span><span id="hp-num">80%</span></div>
        <div class="bar-bg"><div class="bar-fill hp-fill" id="hp-bar" style="width:80%"></div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-label"><span>AP</span><span id="ap-num">60%</span></div>
        <div class="bar-bg"><div class="bar-fill ap-fill" id="ap-bar" style="width:60%"></div></div>
      </div>
    </div>
  </div>

  <!-- 主內容 -->
  <div class="main-grid">

    <!-- 龍的洞穴 -->
    <div class="panel dragon-cave">
      <div class="dragon-art" id="dragon-art">
      /\    /\
     {  `---'  }
      \  o o  /
      { (   \ }    ♪
       )  -  }    ♫
      /    | \   ♪
     /    |  \  ♪
    /_____|\___\
      </div>
      <div class="dragon-info">
        <div class="dragon-mood" id="dragon-mood">💚 心情平靜</div>
        <div class="dragon-speech" id="dragon-speech">嗨！我是黑龍。輸入訊息開始聊天~</div>
      </div>
    </div>

    <!-- 技能 -->
    <div class="panel">
      <div class="panel-title">⚡ 技能</div>
      <div class="skills-grid">
        <button class="skill-btn" onclick="useSkill('web')"><span class="skill-icon">🌐</span> 網頁搜索</button>
        <button class="skill-btn" onclick="useSkill('term')"><span class="skill-icon">💻</span> 執行命令</button>
        <button class="skill-btn" onclick="useSkill('file')"><span class="skill-icon">📁</span> 文件操作</button>
        <button class="skill-btn" onclick="useSkill('code')"><span class="skill-icon">🤖</span> 寫代碼</button>
        <button class="skill-btn" onclick="useSkill('browser')"><span class="skill-icon">🌍</span> 瀏覽器</button>
        <button class="skill-btn" onclick="useSkill('delegate')"><span class="skill-icon">👥</span> 委派任務</button>
      </div>
    </div>

    <!-- 三龍地圖 -->
    <div class="panel">
      <div class="panel-title">🗺️ 三龍地圖</div>
      <div class="dragon-list">
        <div class="dragon-node">
          <div class="dragon-dot dot-online"></div>
          <span>🐉 黑龍</span>
          <span class="dragon-host">本地</span>
          <span style="margin-left:auto;color:#4f4;font-size:11px;">在線</span>
        </div>
        <div class="dragon-node">
          <div class="dragon-dot dot-sleep"></div>
          <span>🐲 青龍</span>
          <span class="dragon-host">本地</span>
          <span style="margin-left:auto;color:#ff4;font-size:11px;">休眠</span>
        </div>
        <div class="dragon-node">
          <div class="dragon-dot dot-offline"></div>
          <span>🐡 金龍</span>
          <span class="dragon-host">VPS</span>
          <span style="margin-left:auto;color:#f66;font-size:11px;">斷線</span>
        </div>
      </div>
    </div>

    <!-- 任務 -->
    <div class="panel">
      <div class="panel-title">🎯 任務</div>
      <div class="missions-list" id="missions-list">
        <div class="mission-item">
          <span class="priority p0">P0</span>協調鏈路修復
        </div>
        <div class="mission-item">
          <span class="priority p1">P1</span>凡龍母體更新
        </div>
        <div class="mission-item done">
          <span class="priority p2">P2</span>遊戲介面
        </div>
      </div>
    </div>

    <!-- 控制台 -->
    <div class="panel console-panel">
      <div class="panel-title">💬 與黑龍對話</div>
      <div class="console-input-row">
        <input type="text" id="cmd-input" placeholder="輸入訊息..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="send-btn" onclick="sendMsg()">送出</button>
      </div>
      <div class="console-output" id="console-out">🐉 等待指令...</div>
    </div>

  </div>

  <!-- 底部導航 -->
  <div class="nav-bar">
    <button class="nav-btn active" onclick="switchTab('main')">首頁</button>
    <button class="nav-btn" onclick="switchTab('status')">狀態</button>
    <button class="nav-btn" onclick="switchTab('skills')">技能</button>
    <button class="nav-btn" onclick="switchTab('log')">日誌</button>
  </div>
</div>

<script>
// ═══ 全域狀態 ═══
let PASSWORD = "";
let DRAGON_MOODS = [
  "💚 心情平靜",
  "💙 專注工作",
  "💛 好奇探索",
  "🧡 輕鬆悠閒",
  "💜 若有所思",
];
let SPEECHES = [
  "有什麼需要幫忙的嗎？",
  "我在聽，說吧！",
  "想到了什麼就問我~",
  "準備好了，隨時可以開始！",
];

// ═══ 登入 ═══
function doLogin() {
  const pwd = document.getElementById("pwd-input").value;
  if (!pwd) return;

  fetch("/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: pwd })
  })
  .then(r => r.json())
  .then(d => {
    if (d.ok) {
      PASSWORD = pwd;
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("game-screen").style.display = "block";
      loadStatus();
      startBreathing();
    } else {
      document.getElementById("login-error").textContent = "密碼錯誤";
    }
  })
  .catch(() => {
    document.getElementById("login-error").textContent = "連線失敗";
  });
}

// ═══ 載入狀態 ═══
function authHeaders() {
  return { "X-Password": PASSWORD };
}

function loadStatus() {
  fetch("/api/status", { headers: authHeaders() })
    .then(r => r.json())
    .then(d => {
      document.getElementById("dragon-status").textContent = d.status;
      document.getElementById("hp-num").textContent = d.hp + "%";
      document.getElementById("ap-num").textContent = d.ap + "%";
      document.getElementById("hp-bar").style.width = d.hp + "%";
      document.getElementById("ap-bar").style.width = d.ap + "%";
    })
    .catch(() => {});
}

// ═══ 技能 ═══
function useSkill(skill) {
  fetch(`/api/skill/${skill}`, {
    method: "POST",
    headers: authHeaders()
  })
  .then(r => r.json())
  .then(d => {
    document.getElementById("dragon-speech").textContent = d.message;
    document.getElementById("console-out").textContent = "⚡ " + d.message;
    // 隨機心情
    document.getElementById("dragon-mood").textContent =
      DRAGON_MOODS[Math.floor(Math.random() * DRAGON_MOODS.length)];
  })
  .catch(() => {});
}

// ═══ 發訊息 ═══
function sendMsg() {
  const input = document.getElementById("cmd-input");
  const msg = input.value.trim();
  if (!msg) return;

  document.getElementById("console-out").textContent = "⏳ 黑龍思考中...";
  document.getElementById("dragon-status").textContent = "處理中...";
  input.value = "";

  fetch("/api/chat", {
    method: "POST",
    headers: { ...authHeaders(), "Content-Type": "application/json" },
    body: JSON.stringify({ message: msg })
  })
  .then(r => r.json())
  .then(d => {
    document.getElementById("console-out").textContent = "🐉 " + d.reply;
    document.getElementById("dragon-speech").textContent = d.reply.slice(0, 80);
    document.getElementById("dragon-status").textContent = "待命中";
    document.getElementById("dragon-mood").textContent =
      DRAGON_MOODS[Math.floor(Math.random() * DRAGON_MOODS.length)];
  })
  .catch(e => {
    document.getElementById("console-out").textContent = "⚠️ 錯誤：" + e;
    document.getElementById("dragon-status").textContent = "待命中";
  });
}

// ═══ 龍的呼吸動畫 ═══
let breathDir = 1, breathY = 0;
function startBreathing() {
  setInterval(() => {
    breathY += breathDir * 0.3;
    if (breathY > 5 || breathY < -5) breathDir *= -1;
    const art = document.getElementById("dragon-art");
    if (art) art.style.transform = `translateY(${breathY}px)`;
  }, 100);
}

// ═══ 龍的自言自語 ═══
function startMonologue() {
  setInterval(() => {
    const el = document.getElementById("dragon-speech");
    if (el && Math.random() > 0.7) {
      el.textContent = SPEECHES[Math.floor(Math.random() * SPEECHES.length)];
    }
  }, 8000);
}
startMonologue();

// ═══ 分頁切換（預留） ═══
function switchTab(tab) {
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
}
</script>

</body>
</html>
